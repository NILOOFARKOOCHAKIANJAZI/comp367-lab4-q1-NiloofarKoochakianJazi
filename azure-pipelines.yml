trigger:
- main

pool:
  name: niloofar-self-hosted-pool   # <-- your self-hosted agent pool name

variables:
  buildConfiguration: 'Release'

steps:

# Install .NET 8 SDK
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.0.x'

# Restore dependencies
- script: dotnet restore
  displayName: 'Restore NuGet packages'

# Build project
- script: dotnet build --configuration $(buildConfiguration)
  displayName: 'Build project'

# Pack NuGet package
- script: dotnet pack StringLibrary/StringLibrary.csproj --configuration $(buildConfiguration) /p:PackageVersion=1.0.$(Build.BuildId) --output $(Build.ArtifactStagingDirectory)
  displayName: 'Pack NuGet package'

# Push to Azure Artifacts
- task: NuGetCommand@2
  inputs:
    command: 'push'
    packagesToPush: '$(Build.ArtifactStagingDirectory)/*.nupkg'
    publishVstsFeed: 'Lab4-Q1-Artifacts/niloofar-feed-Lab4Q1'
  displayName: 'Push package to Azure Artifacts'
